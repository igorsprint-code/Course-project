
  - name: Install_nginx
    package:
        name: nginx
        update_cache: true

  - name: enable nginx
    systemd:
      name: nginx
      enabled: yes 


  - name: configure nginx
    template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
    notify: restart nginx
      

  - name: edit starting page
    template:
      src: index.html.j2
      dest: /var/www/html/index.nginx-debian.html
    notify: restart nginx

  - name: read access.log
    command: chmod +r /var/log/nginx/access.log
  - name: read error.log
    command: chmod +r /var/log/nginx/error.log

  